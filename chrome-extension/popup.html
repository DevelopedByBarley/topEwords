<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="header">
        <div class="logo">W</div>
        <div class="title">TopWords</div>
    </div>

    <div class="actions">
        <button id="open-ta-btn" class="btn-primary">Szövegelemzés megnyitása →</button>
        <a href="https://topwords.eu/words" id="open-words-btn" class="btn-secondary" target="_blank">Szótár</a>
    </div>

    <div class="toggle-row">
        <span class="toggle-label">Kiemelés az oldalon</span>
        <button id="highlight-btn" class="btn-toggle">KI</button>
    </div>

    <div class="page-stats" id="page-stats">
        <button id="stats-btn" class="btn-stats">Oldal statisztikái</button>
        <div id="stats-result" class="stats-result" style="display:none"></div>
    </div>

    <div class="hint">
        <p>💡 <b>Option+W</b> — szókeresés az oldalon</p>
        <p>🖱 Dupla kattintás + tartás — szó kikeresése</p>
        <p>⌨ Jobb katt → „Szó keresése"</p>
        <p>⌨ <b>1–4</b> — státusz beállítása (nyitott szónál)</p>
    </div>

    <script src="popup.js"></script>
</body>
</html>
